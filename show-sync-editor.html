<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>show-sync timeline editor</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* ── Reset ─────────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Theme ──────────────────────────────────────────────────────────────────── */
:root {
  --bg:        #181818;
  --panel:     #222;
  --border:    #383838;
  --text:      #ddd;
  --muted:     #777;
  --accent:    #4a9eff;
  --danger:    #b83030;
  --playhead:  #ff3333;
  --ruler-bg:  #1a1a1a;
  --lane-bg:   #1e1e1e;
  --label-w:   90px;
  --track-h:   46px;
  --ruler-h:   26px;
}

html, body { height: 100%; background: var(--bg); color: var(--text); }
body {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 13px;
  user-select: none;
}

/* ── Controls ───────────────────────────────────────────────────────────────── */
button {
  padding: 4px 10px;
  background: #2e2e2e;
  border: 1px solid #4a4a4a;
  border-radius: 4px;
  color: var(--text);
  cursor: pointer;
  font-size: 12px;
  line-height: 1.4;
  white-space: nowrap;
}
button:hover  { background: #3a3a3a; border-color: #666; }
button:active { background: #252525; }
button.primary { background: var(--accent); border-color: #2a6ec0; color: #fff; }
button.primary:hover { background: #3d8de0; }
button.danger  { background: var(--danger); border-color: #902020; color: #fff; }
button.danger:hover  { background: #a02020; }

input, select {
  background: #2a2a2a;
  border: 1px solid #4a4a4a;
  border-radius: 3px;
  color: var(--text);
  padding: 3px 6px;
  font-size: 12px;
}
input:focus, select:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
input[type="color"]  { width: 36px; height: 24px; padding: 1px 2px; cursor: pointer; }
input[type="number"] { width: 72px; }
input[type="range"]  { cursor: pointer; accent-color: var(--accent); }
input[type="text"]   { width: 150px; user-select: text; }
label { color: var(--muted); font-size: 11px; white-space: nowrap; }

.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

/* ── Toolbar ────────────────────────────────────────────────────────────────── */
#toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#toolbar h1 { font-size: 13px; font-weight: 600; white-space: nowrap; margin-right: 2px; }
.tb-sep    { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
.tb-spacer { flex: 1; min-width: 8px; }
#filename-display {
  color: var(--muted);
  font-size: 11px;
  white-space: nowrap;
  max-width: 220px;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Media area ─────────────────────────────────────────────────────────────── */
#media-area {
  display: flex;
  gap: 8px;
  padding: 8px;
  flex-shrink: 0;
  height: 480px;
}

/* WYSIWYG preview */
#preview-wrap { display: flex; flex-direction: column; gap: 4px; flex: 0 0 280px; }
.panel-label  { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }

/* Device controls row (preset selector + orientation + dims label) */
#device-controls {
  display: flex;
  align-items: center;
  gap: 3px;
  flex-shrink: 0;
}
#device-preset-sel {
  flex: 1;
  min-width: 0;
  font-size: 10px;
  padding: 2px 3px;
}
#device-dims {
  font-size: 9px;
  color: var(--muted);
  white-space: nowrap;
  min-width: 48px;
  text-align: right;
}
#orient-btn { padding: 1px 5px; font-size: 12px; flex-shrink: 0; }

/* Outer container — fixed panel size, clips the scaled inner viewport */
#preview-outer {
  flex: 1;
  min-height: 0;
  background: #111;
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}

/* Device-sized inner div; CSS transform scales it to fit #preview-outer */
#preview-scaler {
  position: absolute;
  top: 50%;
  left: 50%;
  transform-origin: center center;
  /* width, height and transform are set by JS updatePreviewSize() */
}

/* The actual render canvas at full device pixel dimensions */
#preview {
  width: 100%;
  height: 100%;
  background: #000;
  position: relative;
  overflow: hidden;
}
#preview-solid {
  position: absolute; inset: 0;
  background: #000;
  opacity: 0;
}
#preview-image {
  position: absolute; inset: 0;
  pointer-events: none;
  overflow: hidden;
  opacity: 0;
}
#preview-image > img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain;
}
#preview-text {
  position: absolute; inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: bold;
  text-align: center;
  padding: 8px;
  opacity: 0;
  pointer-events: none;
  word-break: break-word;
}

/* Video panel */
#video-wrap  { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
#video-player {
  flex: 1;
  width: 100%;
  background: #000;
  border: 1px solid var(--border);
  border-radius: 4px;
  min-height: 0;
}
#transport { display: flex; align-items: center; gap: 8px; }
#time-display {
  font-size: 12px;
  font-variant-numeric: tabular-nums;
  min-width: 134px;
}
#scrub-bar { flex: 1; }

/* ── Timeline toolbar ───────────────────────────────────────────────────────── */
#tl-toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 8px;
  background: var(--panel);
  border-top:    1px solid var(--border);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}
.add-label  { font-size: 11px; color: var(--muted); }
.zoom-group { margin-left: auto; display: flex; align-items: center; gap: 4px; }
#zoom-val   { min-width: 58px; text-align: center; font-size: 11px; color: var(--muted); }

/* ── Timeline outer container ───────────────────────────────────────────────── */
#tl-outer {
  flex: 1;
  min-height: 0;
  overflow-x: auto;
  overflow-y: auto;
  background: var(--bg);
  position: relative;
}

/* The rows wrapper uses display:table so sticky labels + scrollable lanes work */
#tl-rows {
  display: table;
  border-collapse: collapse;
  min-width: 100%;
}

/* ── Ruler ──────────────────────────────────────────────────────────────────── */
#ruler-row { display: table-row; }

#ruler-label-cell {
  display: table-cell;
  width: var(--label-w);
  min-width: var(--label-w);
  height: var(--ruler-h);
  background: var(--ruler-bg);
  border-right:  1px solid var(--border);
  border-bottom: 1px solid var(--border);
  position: sticky;
  left: 0;
  z-index: 20;
}

#ruler-content {
  display: table-cell;
  position: relative;
  height: var(--ruler-h);
  background: var(--ruler-bg);
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  cursor: pointer;
}

#ruler-canvas { display: block; height: var(--ruler-h); }

/* ── Playhead ───────────────────────────────────────────────────────────────── */
.ph {
  position: absolute;
  top: 0;
  width: 2px;
  background: var(--playhead);
  pointer-events: none;
  z-index: 30;
  transform: translateX(-50%);
}
#ruler-ph { height: 100%; }
#ruler-ph::before {
  content: '';
  position: absolute;
  top: 0;
  left: -5px;
  width: 12px;
  height: 10px;
  background: var(--playhead);
  clip-path: polygon(0 0, 100% 0, 50% 100%);
}
.lane-ph { height: 100%; }

/* ── Markers ─────────────────────────────────────────────────────────────────── */
/* Amber vertical lines placed at marker positions in the ruler and track lanes. */
.marker-line {
  position: absolute;
  top: 0;
  width: 1px;
  background: #f0c040;
  pointer-events: none;
  z-index: 25;
  transform: translateX(-50%);
}
.marker-line.ruler-marker { height: 100%; }
.marker-line.lane-marker  { height: 100%; opacity: 0.5; }

/* Marker delete button — small × shown in the ruler on hover */
.marker-del {
  position: absolute;
  top: 1px;
  width: 14px;
  height: 14px;
  line-height: 14px;
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  color: #f0c040;
  background: rgba(0,0,0,0.7);
  border-radius: 3px;
  cursor: pointer;
  transform: translateX(-50%);
  z-index: 36;
  pointer-events: all;
  opacity: 0;
  transition: opacity 0.1s;
  user-select: none;
}
#ruler-content:hover .marker-del { opacity: 1; }
.marker-del:hover { background: rgba(160,40,0,0.9); color: #fff; }

/* ── Track rows ─────────────────────────────────────────────────────────────── */
.track-row { display: table-row; }

.track-label-cell {
  display: table-cell;
  width: var(--label-w);
  min-width: var(--label-w);
  height: var(--track-h);
  padding: 0 8px;
  background: var(--panel);
  border-right:  1px solid var(--border);
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
  font-size: 12px;
  font-weight: 500;
  position: sticky;
  left: 0;
  z-index: 10;
  cursor: default;
}

.track-lane {
  display: table-cell;
  position: relative;
  height: var(--track-h);
  background: var(--lane-bg);
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  cursor: crosshair;
}
.track-lane:hover { background: #212121; }

/* ── Clips ──────────────────────────────────────────────────────────────────── */
.clip {
  position: absolute;
  top: 4px;
  height: calc(var(--track-h) - 8px);
  border-radius: 3px;
  display: flex;
  align-items: stretch;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.12);
  cursor: pointer;
  min-width: 8px;
  z-index: 2;
}
.clip.selected {
  outline: 2px solid rgba(255,255,255,0.85);
  outline-offset: 1px;
  z-index: 5;
}

.clip-handle {
  width: 7px;
  min-width: 7px;
  flex-shrink: 0;
  background: rgba(0,0,0,0.22);
  cursor: col-resize;
  display: flex;
  align-items: center;
  justify-content: center;
}
.clip-handle::after {
  content: '';
  width: 2px;
  height: 50%;
  background: rgba(255,255,255,0.35);
  border-radius: 1px;
}

.clip-body {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.92);
  text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  cursor: grab;
  overflow: hidden;
  padding: 0 2px;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.clip-body:active { cursor: grabbing; }

/* ── Properties bar ─────────────────────────────────────────────────────────── */
#props-bar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  padding: 5px 10px;
  background: var(--panel);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  min-height: 44px;
}
.props-group { display: flex; align-items: center; gap: 4px; }
#props-hint  { color: var(--muted); font-size: 12px; }
</style>
</head>
<body>

<!-- Hidden file inputs -->
<input type="file" id="mov-input"  accept=".mov,.mp4,.mkv,.avi,.m4v,.webm,.m4a" class="sr-only">
<input type="file" id="show-input" accept=".json"                                class="sr-only">

<!-- ── Toolbar ──────────────────────────────────────────────────────────────── -->
<div id="toolbar">
  <h1>show-sync editor</h1>
  <div class="tb-sep"></div>
  <button onclick="newShow()">New</button>
  <button onclick="movInput()">Load .mov</button>
  <button onclick="showInput()">Load Show</button>
  <button class="primary" onclick="saveShow()">Save Show</button>
  <div class="tb-sep"></div>
  <label>BPM</label>
  <input type="number" id="bpm-input" min="20" max="300" step="1" value="120" style="width:58px"
         oninput="show.bpm = Math.max(20, Math.min(300, parseInt(this.value) || 120))">
  <div class="tb-spacer"></div>
  <span id="filename-display">unsaved</span>
</div>

<!-- ── Media area ───────────────────────────────────────────────────────────── -->
<div id="media-area">

  <!-- WYSIWYG Preview -->
  <div id="preview-wrap">
    <div class="panel-label">Preview</div>
    <div id="device-controls">
      <select id="device-preset-sel" onchange="setDevicePreset(this.value)"></select>
      <button id="orient-btn" onclick="toggleOrientation()" title="Toggle portrait / landscape">↻</button>
      <span id="device-dims">390×844</span>
    </div>
    <div id="preview-outer">
      <div id="preview-scaler">
        <div id="preview">
          <div id="preview-solid"></div>
          <div id="preview-image"><img id="preview-img" src="" alt="" draggable="false"></div>
          <div id="preview-text"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Video player -->
  <div id="video-wrap">
    <div class="panel-label" id="video-label">Reference Video — drag &amp; drop a .mov or click Load .mov</div>
    <video id="video-player" preload="metadata" crossorigin="anonymous"></video>
    <div id="transport">
      <button id="play-btn" onclick="togglePlay()">▶ Play</button>
      <span id="time-display">0:00.00 / 0:00.00</span>
      <input type="range" id="scrub-bar" min="0" max="100" step="any" value="0">
    </div>
  </div>

</div>

<!-- ── Timeline toolbar ─────────────────────────────────────────────────────── -->
<div id="tl-toolbar">
  <span class="add-label">Add clip at playhead:</span>
  <button onclick="addClip('color')"   title="Solid colour block">+ Solid</button>
  <button onclick="addClip('text')"    title="Text overlay">+ Text</button>
  <button onclick="addClip('image')"   title="Image from URL">+ Image</button>
  <button onclick="addClip('fade_in')" title="Fade from black to colour">+ Fade In</button>
  <button onclick="addClip('fade_out')"title="Fade from colour to black">+ Fade Out</button>
  <div class="tb-sep" style="height:18px;align-self:center"></div>
  <span class="add-label">FX:</span>
  <button onclick="addClip('strobe')"      title="Strobe: rapid on/off flash">+ Strobe</button>
  <button onclick="addClip('pulse')"       title="Pulse: sine-wave opacity">+ Pulse</button>
  <button onclick="addClip('glitch')"      title="Glitch: position jitter">+ Glitch</button>
  <button onclick="addClip('blur')"        title="Blur in: starts blurry, sharpens">+ Blur In</button>
  <button onclick="addClip('color_sweep')" title="Color sweep across screen">+ Sweep</button>
  <button onclick="addClip('bounce')"     title="Bounce: vertical sine-wave bounce">+ Bounce</button>
  <button onclick="addClip('shake')"      title="Shake: rapid horizontal shake">+ Shake</button>
  <button onclick="addClip('zoom_pulse')" title="Zoom Pulse: scale in/out">+ Zoom</button>
  <button onclick="addClip('hue_rotate')" title="Hue Rotate: continuous colour-hue cycling">+ HueRot</button>
  <button onclick="addClip('neon_glow')"  title="Neon Glow: pulsing drop-shadow glow">+ Glow</button>
  <div class="zoom-group">
    <span style="font-size:11px;color:var(--muted)">Zoom:</span>
    <button onclick="zoom(-1)">−</button>
    <span id="zoom-val">50 px/s</span>
    <button onclick="zoom(+1)">+</button>
  </div>
</div>

<!-- ── Timeline ─────────────────────────────────────────────────────────────── -->
<div id="tl-outer">
  <div id="tl-rows">

    <!-- Ruler row -->
    <div id="ruler-row">
      <div id="ruler-label-cell"></div>
      <div id="ruler-content">
        <canvas id="ruler-canvas" height="26"></canvas>
        <div class="ph" id="ruler-ph"></div>
      </div>
    </div>

    <!-- Track rows are inserted by JS -->

  </div>
</div>

<!-- ── Properties bar ───────────────────────────────────────────────────────── -->
<div id="props-bar">
  <span id="props-hint">Click a clip to select it — use the Add buttons above to create clips</span>
</div>

<!-- ════════════════════════════════════════════════════════════════════════════ -->
<script>
'use strict';

// ── State ─────────────────────────────────────────────────────────────────────

let show = blankShow();
let pps  = 50;            // pixels per second (zoom level)
let selId     = null;     // selected clip id
let selMarkerId = null;   // selected marker id (for keyboard deletion)
let curFile   = null;     // current filename string
let vidUrl    = null;     // object URL for loaded video
let drag      = null;     // active drag descriptor
let phDrag    = false;    // true while scrubbing the playhead via ruler drag
let clipboard = null;     // deep-copied clip for Ctrl+C / Ctrl+V paste
let _rafId    = null;     // rAF handle for per-frame video/timeline sync

// ── Device presets ────────────────────────────────────────────────────────────
// Each entry: { id, name, w (portrait width px), h (portrait height px) }
// Dimensions are CSS/logical pixels as reported by the device browser.

const DEVICE_PRESETS = [
  { id: 'iphone-se',      name: 'iPhone SE  375\u00d7667',             w: 375, h: 667 },
  { id: 'iphone-14',      name: 'iPhone 14  390\u00d7844',             w: 390, h: 844 },
  { id: 'iphone-14-plus', name: 'iPhone 14 Plus  428\u00d7926',        w: 428, h: 926 },
  { id: 'iphone-14-pm',   name: 'iPhone 14 Pro Max  430\u00d7932',     w: 430, h: 932 },
  { id: 'iphone-15-pro',  name: 'iPhone 15 Pro  393\u00d7852',         w: 393, h: 852 },
  { id: 'iphone-16-pm',   name: 'iPhone 16 Pro Max  440\u00d7956',     w: 440, h: 956 },
  { id: 'android-sm',     name: 'Android S  360\u00d7800',             w: 360, h: 800 },
  { id: 'android-px7',    name: 'Android M \u2013 Pixel 7  412\u00d7915', w: 412, h: 915 },
  { id: 'android-s22u',   name: 'Android L \u2013 S22 Ultra  384\u00d7854', w: 384, h: 854 },
];

let activePreset    = DEVICE_PRESETS[1];  // default: iPhone 14
let deviceLandscape = false;

// ── Font presets ───────────────────────────────────────────────────────────────
// All entries use web-safe / system font stacks that render consistently across
// every browser and OS without requiring any font download.  An empty id means
// "inherit the page default" (system-UI / sans-serif).

const FONT_PRESETS = [
  { id: '',          label: 'Default (system UI)' },
  { id: 'sans',      label: 'Sans-serif',
    css: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" },
  { id: 'serif',     label: 'Serif',
    css: "Georgia, 'Times New Roman', Times, serif" },
  { id: 'mono',      label: 'Monospace',
    css: "'Courier New', Courier, monospace" },
  { id: 'impact',    label: 'Impact',
    css: "Impact, Haettenschweiner, 'Arial Narrow Bold', sans-serif" },
  { id: 'georgia',   label: 'Georgia',
    css: "Georgia, Palatino, 'Palatino Linotype', serif" },
  { id: 'verdana',   label: 'Verdana',
    css: "Verdana, Geneva, Tahoma, sans-serif" },
  { id: 'trebuchet', label: 'Trebuchet MS',
    css: "'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', sans-serif" },
];

/** Return the CSS font-family string for a stored font id ('' = default). */
function fontCss(fontId) {
  const preset = FONT_PRESETS.find(f => f.id === fontId);
  return (preset && preset.css) ? preset.css : '';
}

// ── Defaults ──────────────────────────────────────────────────────────────────

function blankShow() {
  return {
    version: 2,
    bpm: 120,
    media:  { type: 'video', src: '', duration: 0 },
    tracks: [
      { id: 't1', name: 'Solids', layer: 1,  clips: [] },
      { id: 't2', name: 'Text',   layer: 10, clips: [] },
    ],
    markers: [],   // { id, time } — created by pressing 'm' during playback
  };
}

// ── Utility ───────────────────────────────────────────────────────────────────

let _uidc = 0;
function uid() { return (++_uidc).toString(36) + Math.random().toString(36).slice(2, 6); }

function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function t2x(t)  { return t * pps; }
function x2t(x)  { return x / pps; }

// ── BPM helpers ───────────────────────────────────────────────────────────────

/** Convert beats to seconds using the show's current BPM (default 120). */
function beatsToSeconds(beats) {
  const bpm = show.bpm || 120;
  return Math.round(beats * 60 / bpm * 1000) / 1000;
}

/** Set selected clip's duration from a beat count and re-render. */
function setBeatDur(beats) {
  if (!selId) return;
  const found = getClip(selId);
  if (!found) return;
  found.cl.duration = beatsToSeconds(beats);
  render();
  renderPropsBar();
}

function fmtTime(s) {
  if (!isFinite(s) || s < 0) s = 0;
  const m  = Math.floor(s / 60);
  const ss = (s % 60).toFixed(2).padStart(5, '0');
  return m + ':' + ss;
}

function getClip(id) {
  for (const tr of show.tracks) {
    for (const cl of tr.clips) {
      if (cl.id === id) return { cl, tr };
    }
  }
  return null;
}

function clipBg(clip) {
  switch (clip.type) {
    case 'color':        return clip.params?.color || '#c03030';
    case 'text':         return '#2a60c0';
    case 'image':        return '#1a4060';
    case 'fade_in':      return '#c07030';
    case 'fade_out':     return '#7030c0';
    case 'strobe':       return clip.params?.color || '#e0b020';
    case 'pulse':        return clip.params?.color || '#20a060';
    case 'glitch':       return clip.params?.color || '#c020c0';
    case 'blur':         return clip.params?.color || '#2080c0';
    case 'color_sweep':  return clip.params?.color || '#c06020';
    case 'bounce':       return clip.params?.color || '#ff4080';
    case 'shake':        return clip.params?.color || '#8040c0';
    case 'zoom_pulse':   return clip.params?.color || '#40c080';
    case 'hue_rotate':   return clip.params?.color || '#ff6000';
    case 'neon_glow':    return clip.params?.color || '#00d0ff';
    default:             return '#505050';
  }
}

function clipLabel(clip) {
  switch (clip.type) {
    case 'color':        return clip.params?.color || 'solid';
    case 'text':         return clip.params?.text ? `"${clip.params.text}"` : 'text';
    case 'image': {
      const src = clip.params?.src || '';
      const name = src ? src.split('/').pop().split('?')[0].slice(0, 20) : '';
      return name ? '\uD83D\uDDBC ' + name : 'image';
    }
    case 'fade_in':      return 'fade in';
    case 'fade_out':     return 'fade out';
    case 'strobe':       return `strobe ${clip.params?.rate || 10}Hz`;
    case 'pulse':        return `pulse ${clip.params?.rate || 1}Hz`;
    case 'glitch':       return `glitch ${clip.params?.intensity || 8}px`;
    case 'blur':         return `blur ${clip.params?.max_blur || 20}px`;
    case 'color_sweep':  return `sweep ${clip.params?.direction || 'lr'}`;
    case 'bounce':       return `bounce ${clip.params?.rate || 1}Hz`;
    case 'shake':        return `shake ${clip.params?.rate || 4}Hz`;
    case 'zoom_pulse':   return `zoom ${clip.params?.rate || 1}Hz`;
    case 'hue_rotate':   return `hue-rot ${clip.params?.rate || 0.5}Hz`;
    case 'neon_glow':    return `glow ${clip.params?.size || 20}px`;
    default:             return clip.type;
  }
}

function showDur() {
  const vid = document.getElementById('video-player');
  const vd  = isFinite(vid.duration) ? vid.duration : 0;
  return Math.max(vd, show.media?.duration || 0, 60);
}

// ── Device preview ────────────────────────────────────────────────────────────

/** Populate the preset <select> element. */
function initDeviceSelect() {
  const sel = document.getElementById('device-preset-sel');
  DEVICE_PRESETS.forEach((p, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = p.name;
    if (i === 1) opt.selected = true;  // iPhone 14 default
    sel.appendChild(opt);
  });
}

/** Called by the <select> onchange handler. */
function setDevicePreset(idx) {
  activePreset = DEVICE_PRESETS[parseInt(idx, 10)] || DEVICE_PRESETS[1];
  updatePreviewSize();
  renderPreview();
}

/** Toggle portrait ↔ landscape and refresh the preview. */
function toggleOrientation() {
  deviceLandscape = !deviceLandscape;
  updatePreviewSize();
  renderPreview();
}

/** Return the active logical {w, h} in pixels, respecting orientation. */
function currentDeviceDims() {
  const p = activePreset || DEVICE_PRESETS[1];
  return deviceLandscape ? { w: p.h, h: p.w } : { w: p.w, h: p.h };
}

/**
 * Scale the device-sized inner div to fit inside the outer panel.
 * The device div stays at its true logical pixel size; CSS transform
 * shrinks it so the aspect ratio and relative proportions are preserved.
 */
function updatePreviewSize() {
  const { w: dw, h: dh } = currentDeviceDims();
  const outer  = document.getElementById('preview-outer');
  const outerW = outer.clientWidth  || 268;
  const outerH = outer.clientHeight || 420;
  const scale  = Math.min(outerW / dw, outerH / dh, 1);

  const scaler = document.getElementById('preview-scaler');
  scaler.style.width     = dw + 'px';
  scaler.style.height    = dh + 'px';
  scaler.style.transform = 'translateX(-50%) translateY(-50%) scale(' + scale + ')';

  document.getElementById('device-dims').textContent = dw + '\u00d7' + dh;
}

// ── Link URL validation ───────────────────────────────────────────────────────

/**
 * Return a safe URL string if the scheme is http, https, mailto, or tel.
 * Returns '' for any other scheme (including javascript:, data:, vbscript:).
 *
 * For http/https the href is re-serialized from a parsed URL object so the
 * returned string is never the raw user input — it is always a canonical URL
 * produced by the browser's URL parser.
 */
function validateLinkUrl(raw) {
  if (!raw) return '';
  const trimmed = raw.trim();
  // mailto: — allow only printable non-whitespace chars, no HTML special chars
  if (/^mailto:/i.test(trimmed)) {
    return /^mailto:[^\s<>"'`\\]+$/i.test(trimmed) ? trimmed : '';
  }
  // tel: — allow only digits, spaces, +, -, (, )
  if (/^tel:/i.test(trimmed)) {
    return /^tel:[+\d\s\-()]+$/i.test(trimmed) ? trimmed : '';
  }
  // http / https — parse with URL API and return the re-serialized href
  try {
    const u = new URL(trimmed);
    if (u.protocol === 'http:' || u.protocol === 'https:') {
      // Return the browser-canonical href, not the raw input.
      return u.href;
    }
  } catch (_) {}
  return '';
}

// ── Image URL validation ───────────────────────────────────────────────────────

/**
 * Return a safe image URL string if the scheme is http or https.
 * Returns '' for any other scheme (including javascript:, data:, blob:).
 * The href is re-serialized from a parsed URL object so the returned string
 * is always the browser-canonical form of the input.
 */
function validateImageUrl(raw) {
  if (!raw) return '';
  const trimmed = raw.trim();
  try {
    const u = new URL(trimmed);
    if (u.protocol === 'http:' || u.protocol === 'https:') return u.href;
  } catch (_) {}
  return '';
}

// ── Image preload helper ───────────────────────────────────────────────────────

/**
 * Preload all image URLs present in the current show into the browser cache.
 * Call this after loading a show file so images are ready before playback.
 */
function preloadShowImages() {
  const urls = new Set();
  for (const tr of show.tracks) {
    for (const cl of tr.clips) {
      if (cl.type === 'image' && cl.params && cl.params.src) {
        const safe = validateImageUrl(cl.params.src);
        if (safe) urls.add(safe);
      }
    }
  }
  urls.forEach(url => { const img = new Image(); img.src = url; });
}

function tlWidth() {
  return Math.max(t2x(showDur()) + 300, 900);
}

// ── Render ────────────────────────────────────────────────────────────────────

function render() {
  renderRuler();
  renderMarkerHandles();
  renderTracks();
  renderPreview();
  setPlayheadPos();
  updateTransport();
}

// ── Ruler ─────────────────────────────────────────────────────────────────────

function renderRuler() {
  const canvas = document.getElementById('ruler-canvas');
  const W = tlWidth();
  canvas.width = W;
  const H = canvas.height;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, W, H);

  const dur = showDur();

  // Choose tick spacing based on zoom
  let maj = 10, min = 1;
  if      (pps <=  8)  { maj = 120; min = 60;  }
  else if (pps <= 15)  { maj =  60; min = 30;  }
  else if (pps <= 30)  { maj =  30; min = 10;  }
  else if (pps <= 60)  { maj =  10; min =  5;  }
  else if (pps <= 150) { maj =   5; min =  1;  }
  else if (pps <= 300) { maj =   2; min =  0.5;}
  else                 { maj =   1; min =  0.25;}

  ctx.font = '9px monospace';
  ctx.textBaseline = 'bottom';

  for (let t = 0; t <= dur + maj; t += min) {
    const x = Math.round(t2x(t));
    const isMaj = (t % maj) < min * 0.01;
    ctx.beginPath();
    ctx.moveTo(x + 0.5, isMaj ? 4 : 14);
    ctx.lineTo(x + 0.5, H);
    ctx.strokeStyle = isMaj ? '#484848' : '#2c2c2c';
    ctx.stroke();
    if (isMaj) {
      ctx.fillStyle = '#787878';
      ctx.fillText(fmtTime(t), x + 3, H - 1);
    }
  }

  // End marker
  if (dur > 0) {
    const ex = Math.round(t2x(dur));
    ctx.strokeStyle = '#606060';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(ex + 0.5, 0);
    ctx.lineTo(ex + 0.5, H);
    ctx.stroke();
  }

  // Timeline markers (amber lines + time labels at top)
  if (show.markers && show.markers.length) {
    ctx.lineWidth = 1;
    ctx.font = '8px monospace';
    ctx.textBaseline = 'top';
    for (const mk of show.markers) {
      const x = Math.round(t2x(mk.time));
      const isSelected = mk.id === selMarkerId;
      ctx.strokeStyle = isSelected ? '#ff9900' : '#f0c040';
      ctx.lineWidth   = isSelected ? 2 : 1;
      ctx.beginPath();
      ctx.moveTo(x + 0.5, 0);
      ctx.lineTo(x + 0.5, H);
      ctx.stroke();
      ctx.fillStyle = isSelected ? '#ff9900' : '#f0c040';
      ctx.fillText(fmtTime(mk.time), x + 2, 2);
      ctx.lineWidth = 1;
    }
  }

  // Keep ruler-content cell width in sync
  document.getElementById('ruler-content').style.width = W + 'px';
}

// ── Track rows ────────────────────────────────────────────────────────────────

function renderTracks() {
  const container = document.getElementById('tl-rows');
  const W = tlWidth();

  // Remove existing track rows (keep ruler-row)
  while (container.lastChild && container.lastChild.id !== 'ruler-row') {
    container.removeChild(container.lastChild);
  }

  const sorted = [...show.tracks].sort((a, b) => a.layer - b.layer);

  for (const track of sorted) {
    const row = document.createElement('div');
    row.className = 'track-row';
    row.dataset.trackId = track.id;

    // Label
    const labelCell = document.createElement('div');
    labelCell.className = 'track-label-cell';
    labelCell.textContent = track.name;
    row.appendChild(labelCell);

    // Lane
    const lane = document.createElement('div');
    lane.className = 'track-lane';
    lane.dataset.trackId = track.id;
    lane.style.width = W + 'px';

    // Per-lane playhead line
    const lph = document.createElement('div');
    lph.className = 'ph lane-ph';
    lph.dataset.isLanePh = '1';
    lane.appendChild(lph);

    // Per-lane marker lines (amber) — clips snap to these positions
    if (show.markers) {
      for (const mk of show.markers) {
        const ml = document.createElement('div');
        ml.className = 'marker-line lane-marker';
        ml.style.left = t2x(mk.time) + 'px';
        lane.appendChild(ml);
      }
    }

    // Clips
    for (const clip of track.clips) {
      lane.appendChild(makeClipEl(clip, track.id));
    }

    // Click on empty area → deselect
    lane.addEventListener('mousedown', (e) => {
      if (e.target === lane || e.target === lph) {
        selId = null;
        refreshSelection();
        renderPropsBar();
      }
    });

    row.appendChild(lane);
    container.appendChild(row);
  }

  setPlayheadPos();
}

function makeClipEl(clip, trackId) {
  const el = document.createElement('div');
  el.className = 'clip' + (clip.id === selId ? ' selected' : '');
  el.dataset.clipId = clip.id;
  el.style.left       = t2x(clip.start) + 'px';
  el.style.width      = Math.max(8, t2x(clip.duration)) + 'px';
  el.style.background = clipBg(clip);

  const lh = document.createElement('div');
  lh.className = 'clip-handle';
  lh.addEventListener('mousedown', (e) => startDrag(e, 'left', clip.id));

  const body = document.createElement('div');
  body.className = 'clip-body';
  body.textContent = clipLabel(clip);
  body.addEventListener('mousedown', (e) => startDrag(e, 'move', clip.id));

  const rh = document.createElement('div');
  rh.className = 'clip-handle';
  rh.addEventListener('mousedown', (e) => startDrag(e, 'right', clip.id));

  el.appendChild(lh);
  el.appendChild(body);
  el.appendChild(rh);

  el.addEventListener('click', (e) => {
    e.stopPropagation();
    selId = clip.id;
    refreshSelection();
    renderPropsBar();
  });

  return el;
}

function refreshSelection() {
  document.querySelectorAll('.clip').forEach(el => {
    el.classList.toggle('selected', el.dataset.clipId === selId);
  });
}

// ── WYSIWYG Preview ───────────────────────────────────────────────────────────

function renderPreview() {
  const vid = document.getElementById('video-player');
  compositeAt(isFinite(vid.currentTime) ? vid.currentTime : 0);
}

function compositeAt(t) {
  const solidEl = document.getElementById('preview-solid');
  const textEl  = document.getElementById('preview-text');

  const sorted = [...show.tracks].sort((a, b) => a.layer - b.layer);

  let bg = null, bgOp = 0;
  let txt = null, txtColor = '#fff', txtOp = 0, txtSz = 5, txtLinkUrl = '', txtFont = '';
  let imgSrc = null, imgFit = 'contain', imgOp = 0;
  let effectTransform = '', effectFilter = '', effectClipPath = '';

  for (const track of sorted) {
    for (const clip of track.clips) {
      if (t < clip.start || t >= clip.start + clip.duration) continue;

      const pos = t - clip.start;
      const dur = clip.duration;
      const fi  = clip.fade_in  || 0;
      const fo  = clip.fade_out || 0;

      let op = 1;
      if (fi > 0 && pos < fi)       op *= pos / fi;
      if (fo > 0 && pos > dur - fo) op *= (dur - pos) / fo;
      op = clamp(op, 0, 1);

      const type   = clip.type;
      const params = clip.params || {};

      if (type === 'color' || type === 'fade_in' || type === 'fade_out') {
        bg   = params.color || '#ff0000';
        bgOp = op;
      } else if (type === 'text') {
        txt        = params.text       || null;
        txtColor   = params.color      || '#ffffff';
        txtSz      = params.size       || 5;
        txtOp      = op;
        txtLinkUrl = params.link_url   || '';
        txtFont    = params.font_family || '';
      } else if (type === 'image') {
        imgSrc = validateImageUrl(params.src || '');
        imgFit = params.fit || 'contain';
        imgOp  = op;
      } else if (type === 'strobe') {
        const rate = params.rate || 10;
        if (Math.floor(pos * rate * 2) % 2 === 0) {
          bg   = params.color || '#ffffff';
          bgOp = op;
        }
      } else if (type === 'pulse') {
        const rate = params.rate || 1;
        const pOp  = 0.5 + 0.5 * Math.sin(2 * Math.PI * pos * rate);
        bg   = params.color || '#ffffff';
        bgOp = pOp * op;
      } else if (type === 'glitch') {
        const intensity = params.intensity || 8;
        const dx = Math.sin(pos * 137.5) * intensity * op;
        const dy = Math.cos(pos * 89.3)  * intensity * op;
        bg   = params.color || '#ff0000';
        bgOp = op;
        effectTransform = `translate(${dx.toFixed(1)}px,${dy.toFixed(1)}px)`;
      } else if (type === 'blur') {
        const maxBlur = params.max_blur || 20;
        const blurVal = maxBlur * Math.max(0, 1 - pos / dur);
        bg   = params.color || '#ffffff';
        bgOp = op;
        effectFilter = `blur(${blurVal.toFixed(1)}px)`;
      } else if (type === 'color_sweep') {
        const progress  = clamp(pos / dur, 0, 1);
        const direction = params.direction || 'lr';
        const inv = ((1 - progress) * 100).toFixed(1);
        if      (direction === 'lr') effectClipPath = `inset(0 ${inv}% 0 0)`;
        else if (direction === 'rl') effectClipPath = `inset(0 0 0 ${inv}%)`;
        else if (direction === 'tb') effectClipPath = `inset(0 0 ${inv}% 0)`;
        else                          effectClipPath = `inset(${inv}% 0 0 0)`;
        bg   = params.color || '#ff0000';
        bgOp = 1;
      } else if (type === 'bounce') {
        const rate = params.rate      || 1;
        const amp  = params.amplitude || 30;
        const dy   = Math.sin(2 * Math.PI * pos * rate) * amp * op;
        bg   = params.color || '#ff4080';
        bgOp = op;
        effectTransform = `translateY(${dy.toFixed(1)}px)`;
      } else if (type === 'shake') {
        const rate = params.rate      || 4;
        const amp  = params.amplitude || 15;
        const dx   = Math.sin(2 * Math.PI * pos * rate) * amp * op;
        bg   = params.color || '#8040c0';
        bgOp = op;
        effectTransform = `translateX(${dx.toFixed(1)}px)`;
      } else if (type === 'zoom_pulse') {
        const rate   = params.rate   || 1;
        const amount = params.amount || 0.2;
        const scale  = 1 + amount * Math.sin(2 * Math.PI * pos * rate);
        bg   = params.color || '#40c080';
        bgOp = op;
        effectTransform = `scale(${scale.toFixed(3)})`;
      } else if (type === 'hue_rotate') {
        const rate = params.rate || 0.5;
        const deg  = (pos * rate * 360) % 360;
        bg   = params.color || '#ff6000';
        bgOp = op;
        effectFilter = `hue-rotate(${deg.toFixed(1)}deg)`;
      } else if (type === 'neon_glow') {
        const size = params.size || 20;
        const rate = params.rate || 2;
        const glow = size * (0.5 + 0.5 * Math.sin(2 * Math.PI * pos * rate));
        bg   = params.color || '#00d0ff';
        bgOp = op;
        effectFilter = `drop-shadow(0 0 ${glow.toFixed(1)}px ${params.color || '#00d0ff'})`;
      }
    }
  }

  solidEl.style.background = bg || '#000';
  solidEl.style.opacity    = (bg && bgOp > 0) ? bgOp : 0;
  solidEl.style.transform  = effectTransform;
  solidEl.style.filter     = effectFilter;
  solidEl.style.clipPath   = effectClipPath;

  // ── Image layer ───────────────────────────────────────────────────────────
  const imgEl  = document.getElementById('preview-image');
  const imgTag = document.getElementById('preview-img');
  if (imgSrc) {
    if (imgTag.getAttribute('src') !== imgSrc) imgTag.src = imgSrc;
    imgTag.style.objectFit = imgFit;
    imgEl.style.opacity = imgOp;
  } else {
    imgEl.style.opacity = 0;
  }

  if (txt !== null && txtOp > 0) {
    const { w: dw, h: dh } = currentDeviceDims();
    // Font size as a true device-pixel value so preview matches the device.
    // txtSz is in vmin units (1 vmin = 1 % of min(viewport-w, viewport-h)).
    const pxFont = (txtSz / 100) * Math.min(dw, dh);
    while (textEl.firstChild) textEl.removeChild(textEl.firstChild);
    if (txtLinkUrl) {
      const a = document.createElement('a');
      a.href = txtLinkUrl;
      a.textContent = txt;
      a.style.cssText = 'color:' + txtColor + ';text-decoration:underline;pointer-events:none;';
      textEl.appendChild(a);
    } else {
      textEl.textContent = txt;
    }
    textEl.style.color      = txtColor;
    textEl.style.fontSize   = pxFont + 'px';
    textEl.style.fontFamily = fontCss(txtFont);
    textEl.style.opacity    = txtOp;
  } else {
    while (textEl.firstChild) textEl.removeChild(textEl.firstChild);
    textEl.style.fontFamily = '';
    textEl.style.opacity = 0;
  }
}

// ── RAF playback sync ─────────────────────────────────────────────────────────
// vid.currentTime is the single authoritative time reference for the editor.
// The browser's timeupdate event fires only ~4-10 Hz which causes visible lag
// between the video frame and the playhead/preview during playback.
// A requestAnimationFrame loop keeps every visual element locked to the same
// clock at display frame-rate, eliminating variable drift.  Seeking and
// scrubbing also update visuals immediately so the playhead never waits for
// a deferred timeupdate callback.

function _rafFrame() {
  const vid = document.getElementById('video-player');
  if (!vid || vid.paused || vid.ended) { _rafId = null; return; }
  const t   = isFinite(vid.currentTime) ? vid.currentTime : 0;
  // dur falls back to show.media.duration because stored metadata may be
  // available while the video element is still seeking or buffering.
  // t has no meaningful fallback other than 0 — we cannot estimate position.
  const dur = isFinite(vid.duration)    ? vid.duration    : (show.media?.duration || 0);
  setPlayheadPosAt(t);
  compositeAt(t);
  document.getElementById('time-display').textContent = fmtTime(t) + ' / ' + fmtTime(dur);
  const bar = document.getElementById('scrub-bar');
  if (dur > 0) { bar.max = dur; bar.value = t; }
  // Keep the playhead visible in the timeline viewport
  const tl  = document.getElementById('tl-outer');
  const phX = t2x(t);
  const vw  = tl.clientWidth - 90;  // 90 = --label-w
  const sl  = tl.scrollLeft;
  if (phX < sl || phX > sl + vw - 40) tl.scrollLeft = phX - vw / 2;
  _rafId = requestAnimationFrame(_rafFrame);
}

// ── Playhead / Transport ─────────────────────────────────────────────────────

function setPlayheadPos() {
  const vid = document.getElementById('video-player');
  const x   = Math.round(t2x(isFinite(vid.currentTime) ? vid.currentTime : 0));
  const px  = x + 'px';

  const rph = document.getElementById('ruler-ph');
  if (rph) rph.style.left = px;

  document.querySelectorAll('[data-is-lane-ph]').forEach(el => {
    el.style.left = px;
  });
}

function updateTransport() {
  const vid = document.getElementById('video-player');
  const t   = isFinite(vid.currentTime) ? vid.currentTime : 0;
  const dur = isFinite(vid.duration)    ? vid.duration    : (show.media?.duration || 0);

  document.getElementById('time-display').textContent = fmtTime(t) + ' / ' + fmtTime(dur);

  const bar = document.getElementById('scrub-bar');
  if (dur > 0) { bar.max = dur; bar.value = t; }
}

function togglePlay() {
  const vid = document.getElementById('video-player');
  const btn = document.getElementById('play-btn');
  if (vid.paused) {
    vid.play().catch(() => {});
    btn.textContent = '⏸ Pause';
  } else {
    vid.pause();
    btn.textContent = '▶ Play';
  }
}

// ── Ruler click / drag → seek ──────────────────────────────────────────────────

// Convert a viewport clientX into a timeline pixel position, accounting for scroll.
function rulerX(clientX) {
  const canvas = document.getElementById('ruler-canvas');
  const rect   = canvas.getBoundingClientRect();
  return clientX - rect.left + document.getElementById('tl-outer').scrollLeft;
}

document.getElementById('ruler-content').addEventListener('mousedown', (e) => {
  const tlX = rulerX(e.clientX);
  const t   = x2t(tlX);

  // Click near an existing marker → select it (and don't seek)
  if (show.markers && show.markers.length) {
    const threshold = 6 / pps;  // 6 px in seconds at current zoom
    let nearest = null, nearestDist = Infinity;
    for (const mk of show.markers) {
      const d = Math.abs(t - mk.time);
      if (d < nearestDist) { nearest = mk; nearestDist = d; }
    }
    if (nearest && nearestDist <= threshold) {
      selMarkerId = nearest.id;
      renderRuler();   // redraw to highlight selected marker
      return;
    }
  }

  // No marker nearby → deselect marker and start playhead scrub
  selMarkerId = null;
  phDrag = true;
  seekTo(t);
});

function seekTo(t) {
  const vid = document.getElementById('video-player');
  const dur = showDur();
  const target = clamp(t, 0, dur);
  if (isFinite(vid.duration)) {
    vid.currentTime = target;
    // Immediately sync visuals — do not wait for the async timeupdate callback
    setPlayheadPosAt(target);
    compositeAt(target);
    document.getElementById('time-display').textContent = fmtTime(target) + ' / ' + fmtTime(dur);
    const bar = document.getElementById('scrub-bar');
    if (dur > 0) { bar.max = dur; bar.value = target; }
  } else {
    // No video loaded — move playhead manually
    setPlayheadPosAt(target);
    compositeAt(target);
    document.getElementById('time-display').textContent = fmtTime(target) + ' / ' + fmtTime(dur);
  }
}

function setPlayheadPosAt(t) {
  const x  = Math.round(t2x(t));
  const px = x + 'px';
  const rph = document.getElementById('ruler-ph');
  if (rph) rph.style.left = px;
  document.querySelectorAll('[data-is-lane-ph]').forEach(el => { el.style.left = px; });
}

document.getElementById('scrub-bar').addEventListener('input', (e) => {
  const vid = document.getElementById('video-player');
  const t = parseFloat(e.target.value);
  if (isFinite(vid.duration)) {
    vid.currentTime = t;
    // Immediately sync visuals — do not wait for the async timeupdate callback
    setPlayheadPosAt(t);
    compositeAt(t);
  } else {
    setPlayheadPosAt(t);
    compositeAt(t);
  }
});

// ── Drag handling ─────────────────────────────────────────────────────────────

function startDrag(e, type, clipId) {
  e.preventDefault();
  e.stopPropagation();

  const found = getClip(clipId);
  if (!found) return;
  const { cl } = found;

  selId = clipId;
  refreshSelection();
  renderPropsBar();

  drag = {
    type,
    clipId,
    startX:    e.clientX,
    origStart: cl.start,
    origDur:   cl.duration,
  };
}

document.addEventListener('mousemove', (e) => {
  // Timeline playhead scrub drag
  if (phDrag) {
    seekTo(x2t(rulerX(e.clientX)));
  }

  if (!drag) return;

  const found = getClip(drag.clipId);
  if (!found) return;
  const { cl } = found;

  const dx = e.clientX - drag.startX;
  const dt = dx / pps;
  const maxT = showDur();

  if (drag.type === 'move') {
    const raw = clamp(drag.origStart + dt, 0, maxT - cl.duration);
    cl.start = snapToMarker(raw);
  } else if (drag.type === 'left') {
    const rawStart  = clamp(drag.origStart + dt, 0, drag.origStart + drag.origDur - 0.05);
    const newStart  = snapToMarker(rawStart);
    const newDur    = drag.origDur - (newStart - drag.origStart);
    cl.start    = newStart;
    cl.duration = Math.max(0.05, newDur);
  } else if (drag.type === 'right') {
    const rawEnd    = cl.start + clamp(drag.origDur + dt, 0.05, maxT - cl.start);
    const snappedEnd = snapToMarker(rawEnd);
    cl.duration = Math.max(0.05, snappedEnd - cl.start);
  }

  // Fast visual update — just move the DOM element
  const el = document.querySelector(`[data-clip-id="${drag.clipId}"]`);
  if (el) {
    el.style.left  = t2x(cl.start) + 'px';
    el.style.width = Math.max(8, t2x(cl.duration)) + 'px';
  }

  renderPreview();
  syncPropsInputs(cl);
});

document.addEventListener('mouseup', () => {
  phDrag = false;
  if (drag) {
    drag = null;
    render();
  }
});

// ── Properties bar ────────────────────────────────────────────────────────────

function _hint(text) {
  const sp = document.createElement('span');
  sp.id = 'props-hint';
  sp.textContent = text;
  return sp;
}

function renderPropsBar() {
  const panel = document.getElementById('props-bar');
  // Clear existing children safely
  while (panel.firstChild) panel.removeChild(panel.firstChild);

  if (!selId) {
    panel.appendChild(_hint('Click a clip to select it — use the Add buttons above to create clips'));
    return;
  }

  const found = getClip(selId);
  if (!found) {
    panel.appendChild(_hint('No clip selected'));
    return;
  }
  const { cl } = found;

  function g(labelText, ...els) {
    const grp = document.createElement('div');
    grp.className = 'props-group';
    const lbl = document.createElement('label');
    lbl.textContent = labelText;
    grp.appendChild(lbl);
    els.forEach(el => grp.appendChild(el));
    return grp;
  }

  function numInp(val, onch) {
    const inp = document.createElement('input');
    inp.type  = 'number';
    inp.step  = '0.01';
    inp.value = val;
    inp.addEventListener('change', () => { onch(parseFloat(inp.value) || 0); render(); });
    return inp;
  }

  // Type
  const sel = document.createElement('select');
  [['color','Solid colour'],['text','Text'],['image','Image'],['fade_in','Fade In'],['fade_out','Fade Out'],
   ['strobe','Strobe'],['pulse','Pulse'],['glitch','Glitch'],['blur','Blur In'],['color_sweep','Color Sweep'],
   ['bounce','Bounce'],['shake','Shake'],['zoom_pulse','Zoom Pulse'],['hue_rotate','Hue Rotate'],['neon_glow','Neon Glow']
  ].forEach(([v, lbl]) => {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = lbl;
    if (v === cl.type) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => {
    cl.type = sel.value;
    if (!cl.params) cl.params = {};
    render();
    renderPropsBar();
  });
  panel.appendChild(g('Type', sel));

  // Start / Duration
  panel.appendChild(g('Start (s)',    numInp(cl.start.toFixed(3),    v => { cl.start    = Math.max(0, v); })));
  panel.appendChild(g('Duration (s)', numInp(cl.duration.toFixed(3), v => { cl.duration = Math.max(0.05, v); })));

  // Beat-duration helper
  const bpmNow = show.bpm || 120;
  const beatGrp = document.createElement('div');
  beatGrp.className = 'props-group';
  const beatLbl = document.createElement('label');
  beatLbl.textContent = `Beats (${bpmNow} BPM) →`;
  beatGrp.appendChild(beatLbl);
  [[0.25,'¼'],[0.5,'½'],[1,'1'],[2,'2'],[4,'4']].forEach(([b, lbl]) => {
    const btn = document.createElement('button');
    btn.textContent = lbl;
    btn.title = `Set duration to ${b} beat${b !== 1 ? 's' : ''} (${beatsToSeconds(b)}s at ${bpmNow} BPM)`;
    btn.style.cssText = 'padding:2px 6px;font-size:11px;';
    btn.onclick = () => setBeatDur(b);
    beatGrp.appendChild(btn);
  });
  panel.appendChild(beatGrp);

  // Colour
  if (!cl.params) cl.params = {};
  const col = document.createElement('input');
  col.type  = 'color';
  col.value = cl.params.color || '#ff0000';
  col.addEventListener('input', () => {
    cl.params.color = col.value;
    const el = document.querySelector(`[data-clip-id="${cl.id}"]`);
    if (el) el.style.background = clipBg(cl);
    renderPreview();
  });
  col.addEventListener('change', () => render());
  panel.appendChild(g('Colour', col));

  // Text fields (only for text clips)
  if (cl.type === 'text') {
    const txt = document.createElement('input');
    txt.type         = 'text';
    txt.value        = cl.params.text || '';
    txt.placeholder  = 'Text content';
    txt.style.userSelect = 'text';
    txt.addEventListener('input', () => {
      cl.params.text = txt.value;
      const el = document.querySelector(`[data-clip-id="${cl.id}"]`);
      if (el) el.querySelector('.clip-body').textContent = clipLabel(cl);

    const sz = document.createElement('input');
    sz.type  = 'number';

    sz.value = cl.params.size || 5;

    sz.style.width = '64px';
    sz.addEventListener('change', () => { cl.params.size = parseFloat(sz.value) || 5; renderPreview(); });
    panel.appendChild(g('Size (vmin)', sz));

    // Font family (web-safe system font stack)
    const fontSel = document.createElement('select');
    fontSel.style.cssText = 'font-size:11px;';
    FONT_PRESETS.forEach(fp => {
      const opt = document.createElement('option');
      opt.value = fp.id;

    // Link URL (optional — makes the text a clickable link on client devices)
    const urlInp = document.createElement('input');
    urlInp.type        = 'text';
    urlInp.value       = cl.params.link_url || '';
    urlInp.placeholder = 'https://...';
    urlInp.style.cssText = 'width:180px;user-select:text;';
    urlInp.title       = 'Optional link. Allowed: http, https, mailto, tel';
    urlInp.addEventListener('change', () => {
      const valid = validateLinkUrl(urlInp.value);
      if (valid) {
        cl.params.link_url = valid;
      } else {
        delete cl.params.link_url;
      }
      urlInp.value = valid;
      renderPreview();

    panel.appendChild(g('Link URL', urlInp));

  // Image clip properties
  if (cl.type === 'image') {
    if (!cl.params) cl.params = {};
    const urlInp = document.createElement('input');
    urlInp.type        = 'text';
    urlInp.value       = cl.params.src || '';

    panel.appendChild(g('Image URL', urlInp));

    // Fit mode
    const fitSel = document.createElement('select');
    fitSel.style.cssText = 'font-size:11px;';
    [['contain','Contain (letterbox)'],['cover','Cover (crop)'],['fill','Fill (stretch)']].forEach(([v, lbl]) => {
      const opt = document.createElement('option');
      opt.value = v; opt.textContent = lbl;
      if (v === (cl.params.fit || 'contain')) opt.selected = true;
      fitSel.appendChild(opt);
    });
    fitSel.addEventListener('change', () => {
      cl.params.fit = fitSel.value;
      renderPreview();
    });
    panel.appendChild(g('Fit', fitSel));

    // Load status / dimension check (async — populates after image loads)
    if (cl.params.src) {
      const hint = document.createElement('span');
      hint.style.cssText = 'font-size:10px;color:var(--muted);white-space:nowrap;';
      hint.textContent = '\u23F3 loading\u2026';
      const probe = new Image();
      probe.onload = () => {
        const w = probe.naturalWidth, h = probe.naturalHeight;
        const large = w > 1200 || h > 1200;
        hint.textContent = `${w}\u00d7${h}px ${large ? '\u26a0 large \u2014 consider resizing to \u2264800px' : '\u2713'}`;
        hint.style.color = large ? '#f0a040' : '#60b060';
      };
      probe.onerror = () => { hint.textContent = '\u2717 could not load'; hint.style.color = '#c04040'; };
      probe.src = cl.params.src;
      panel.appendChild(hint);

  // Effect-specific params (new effect types)
  if (cl.type === 'strobe') {
    const rateInp = document.createElement('input');
    rateInp.type = 'number'; rateInp.min = 0.5; rateInp.max = 60; rateInp.step = 0.5;
    rateInp.value = cl.params.rate || 10;

  if (cl.type === 'pulse') {
    const rateInp = document.createElement('input');
    rateInp.type = 'number'; rateInp.min = 0.1; rateInp.max = 20; rateInp.step = 0.1;
    rateInp.value = cl.params.rate || 1;
    rateInp.style.width = '64px';
    rateInp.title = 'Pulse cycles per second (Hz)';
    rateInp.addEventListener('change', () => {
      cl.params.rate = parseFloat(rateInp.value) || 1;
      const el = document.querySelector(`[data-clip-id="${cl.id}"]`);
      if (el) el.querySelector('.clip-body').textContent = clipLabel(cl);
      renderPreview();
    });

  }

  if (cl.type === 'glitch') {
    const intInp = document.createElement('input');
    intInp.type = 'number'; intInp.min = 1; intInp.max = 100; intInp.step = 1;
    intInp.value = cl.params.intensity || 8;
    intInp.style.width = '64px';
    intInp.title = 'Maximum jitter offset in pixels';
    intInp.addEventListener('change', () => {

      const el = document.querySelector(`[data-clip-id="${cl.id}"]`);
      if (el) el.querySelector('.clip-body').textContent = clipLabel(cl);

  if (cl.type === 'blur') {
    const blurInp = document.createElement('input');
    blurInp.type = 'number'; blurInp.min = 1; blurInp.max = 100; blurInp.step = 1;
    blurInp.value = cl.params.max_blur || 20;
    blurInp.style.width = '64px';

    rateInp.type  = 'number';
    rateInp.min   = 0.1; rateInp.max = 20; rateInp.step = 0.1;

    rateInp.addEventListener('change', () => {

      if (el) el.querySelector('.clip-body').textContent = clipLabel(cl);

  if (cl.type === 'bounce' || cl.type === 'shake') {

  if (cl.type === 'zoom_pulse') {
    const amtInp = document.createElement('input');
    amtInp.type  = 'number'; amtInp.min = 0.01; amtInp.max = 1; amtInp.step = 0.01;
    amtInp.value = cl.params.amount || 0.2;

  if (cl.type === 'neon_glow') {
    const sizeInp = document.createElement('input');

    rateInp2.value = cl.params.rate || 2;
    rateInp2.style.width = '64px';
    rateInp2.title = 'Glow pulse cycles per second (Hz)';
    rateInp2.addEventListener('change', () => {
      cl.params.rate = parseFloat(rateInp2.value) || 2;
      renderPreview();
    });
    panel.appendChild(g('Glow Size (px)', sizeInp));
    panel.appendChild(g('Rate (Hz)', rateInp2));
  }

  // Fade in / out
  panel.appendChild(g('Fade In (s)',  numInp((cl.fade_in  || 0).toFixed(2), v => { cl.fade_in  = Math.max(0, v); renderPreview(); })));
  panel.appendChild(g('Fade Out (s)', numInp((cl.fade_out || 0).toFixed(2), v => { cl.fade_out = Math.max(0, v); renderPreview(); })));
  const del = document.createElement('button');
  del.className   = 'danger';
  del.textContent = 'Delete';
  del.onclick     = deleteSelected;
  panel.appendChild(del);
}

function syncPropsInputs(cl) {
  // Quick update of Start/Duration inputs during drag
  const inputs = document.querySelectorAll('#props-bar input[type="number"]');
  if (inputs[0]) inputs[0].value = cl.start.toFixed(3);
  if (inputs[1]) inputs[1].value = cl.duration.toFixed(3);
}

// ── Add / Delete clips ────────────────────────────────────────────────────────

function addClip(type) {
  const vid   = document.getElementById('video-player');
  const start = isFinite(vid.currentTime) ? vid.currentTime : 0;

  const sorted = [...show.tracks].sort((a, b) => a.layer - b.layer);
  const target = (type === 'text' || type === 'image')
    ? (sorted.find(t => t.layer >= 10) || sorted[sorted.length - 1])
    : (sorted.find(t => t.layer <  10) || sorted[0]);

  function defaultParams(t) {
    switch (t) {
      case 'text':        return { color: '#ffffff', text: 'Text', size: 5, font_family: '' };
      case 'image':       return { src: '', fit: 'contain' };
      case 'strobe':      return { color: '#ffffff', rate: 10 };
      case 'pulse':       return { color: '#ffffff', rate: 1 };
      case 'glitch':      return { color: '#ff4040', intensity: 8 };
      case 'blur':        return { color: '#ffffff', max_blur: 20 };
      case 'color_sweep': return { color: '#ff0000', direction: 'lr' };
      case 'bounce':      return { color: '#ff4080', rate: 1,   amplitude: 30 };
      case 'shake':       return { color: '#8040c0', rate: 4,   amplitude: 15 };
      case 'zoom_pulse':  return { color: '#40c080', rate: 1,   amount: 0.2 };
      case 'hue_rotate':  return { color: '#ff6000', rate: 0.5 };
      case 'neon_glow':   return { color: '#00d0ff', size: 20,  rate: 2 };
      default:            return { color: '#ff0000' };
    }
  }

  const clip = {
    id:       uid(),
    type,
    start,
    duration: 2.0,
    params:   defaultParams(type),
    fade_in:  0,
    fade_out: 0,
  };

  target.clips.push(clip);
  selId = clip.id;
  render();
  renderPropsBar();
}

function deleteSelected() {
  if (!selId) return;
  for (const tr of show.tracks) {
    tr.clips = tr.clips.filter(c => c.id !== selId);
  }
  selId = null;
  render();
  renderPropsBar();
}

// ── Copy / Paste clips (Ctrl+C / Ctrl+V) ──────────────────────────────────────
// Copies the currently selected text or solid/colour clip.
// Paste places a duplicate at the current playhead position on the same track type.

function copySelected() {
  if (!selId) return;
  const found = getClip(selId);
  if (!found) return;
  // All supported clip types can be copied: color, text, fade_in, fade_out, and new FX types
  const allowedTypes = ['color', 'text', 'image', 'fade_in', 'fade_out', 'strobe', 'pulse', 'glitch', 'blur', 'color_sweep',
                        'bounce', 'shake', 'zoom_pulse', 'hue_rotate', 'neon_glow'];
  if (!allowedTypes.includes(found.cl.type)) return;
  clipboard = JSON.parse(JSON.stringify(found.cl));  // deep copy, preserves all params
}

function pasteClip() {
  if (!clipboard) return;
  const vid   = document.getElementById('video-player');
  const start = isFinite(vid.currentTime) ? vid.currentTime : 0;

  const newClip    = JSON.parse(JSON.stringify(clipboard));
  newClip.id       = uid();
  newClip.start    = start;  // paste at current playhead; duration/params preserved

  // Route to the correct track (text → Text track, others → Solids track)
  const sorted = [...show.tracks].sort((a, b) => a.layer - b.layer);
  const target = (newClip.type === 'text' || newClip.type === 'image')
    ? (sorted.find(t => t.layer >= 10) || sorted[sorted.length - 1])
    : (sorted.find(t => t.layer <  10) || sorted[0]);

  target.clips.push(newClip);
  selId = newClip.id;
  render();
  renderPropsBar();
}

// ── Markers ───────────────────────────────────────────────────────────────────
// Press 'm' while the timeline is playing to drop a marker at the current time.
// Markers are shown as amber lines on the ruler and each track lane.
// Clips snap to nearby marker positions when dragged or resized (see snapToMarker).

function addMarker() {
  const vid = document.getElementById('video-player');
  const t   = isFinite(vid.currentTime) ? vid.currentTime : 0;
  if (!show.markers) show.markers = [];
  show.markers.push({ id: uid(), time: parseFloat(t.toFixed(3)) });
  show.markers.sort((a, b) => a.time - b.time);
  render();
}

// Render interactive × delete handles for each marker in the ruler
function renderMarkerHandles() {
  const content = document.getElementById('ruler-content');
  content.querySelectorAll('.marker-del').forEach(el => el.remove());
  if (!show.markers || !show.markers.length) return;
  for (const mk of show.markers) {
    const btn = document.createElement('div');
    btn.className      = 'marker-del';
    btn.style.left     = t2x(mk.time) + 'px';
    btn.textContent    = '×';
    btn.title          = 'Delete marker at ' + fmtTime(mk.time);
    // Prevent mousedown from reaching ruler-content (would seek)
    btn.addEventListener('mousedown', e => { e.stopPropagation(); e.preventDefault(); });
    btn.addEventListener('click',     e => { e.stopPropagation(); deleteMarker(mk.id); });
    content.appendChild(btn);
  }
}

function deleteMarker(id) {
  if (!show.markers) return;
  show.markers = show.markers.filter(m => m.id !== id);
  if (selMarkerId === id) selMarkerId = null;
  render();
}

// ── Snap-to-marker helper ─────────────────────────────────────────────────────
// Returns `t` snapped to the nearest marker if within the snap threshold
// (8 px at the current zoom level).  Used in the drag handler for both
// moving clips and resizing their start/end handles.

function snapToMarker(t) {
  if (!show.markers || !show.markers.length) return t;
  const threshold = 8 / pps;   // 8 px expressed in seconds at current zoom
  // Find the single nearest marker; iterate all markers for correctness
  let nearest = null, nearestDist = Infinity;
  for (const mk of show.markers) {
    const d = Math.abs(t - mk.time);
    if (d < nearestDist) { nearest = mk; nearestDist = d; }
  }
  return (nearest && nearestDist <= threshold) ? nearest.time : t;
}

// ── Zoom ──────────────────────────────────────────────────────────────────────

function zoom(dir) {
  pps = dir > 0
    ? Math.min(600, pps * 1.5)
    : Math.max(4,   pps / 1.5);
  document.getElementById('zoom-val').textContent = Math.round(pps) + ' px/s';
  render();
}

// ── File I/O ──────────────────────────────────────────────────────────────────

function movInput() { document.getElementById('mov-input').click(); }
function showInput() { document.getElementById('show-input').click(); }

document.getElementById('mov-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  loadMovFile(file);
  e.target.value = '';
});

function loadMovFile(file) {
  if (vidUrl) URL.revokeObjectURL(vidUrl);
  const objUrl = URL.createObjectURL(file);
  // Confirm createObjectURL returned a blob: URL before touching the DOM.
  let parsed;
  try { parsed = new URL(objUrl); } catch (err) { URL.revokeObjectURL(objUrl); return; }
  if (parsed.protocol !== 'blob:') { URL.revokeObjectURL(objUrl); return; }
  vidUrl = objUrl;
  const vid = document.getElementById('video-player');
  vid.src = vidUrl;
  vid.load();
  vid.addEventListener('loadedmetadata', () => {
    show.media.src      = file.name;
    show.media.duration = vid.duration;
    document.getElementById('video-label').textContent = 'Reference Video: ' + file.name;
    render();
  }, { once: true });
}

document.getElementById('show-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      loadShowData(JSON.parse(ev.target.result), file.name);
    } catch (err) {
      alert('Failed to parse show file:\n' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

function loadShowData(data, filename) {
  if (data.tracks) {
    show = data;
    show.version = 2;
  } else if (data.effects) {
    show = migrateV1(data);
  } else {
    alert('Unrecognised show file format (missing "tracks" or "effects" key).');
    return;
  }

  // Ensure all clips have ids
  for (const tr of show.tracks) {
    for (const cl of tr.clips) {
      if (!cl.id) cl.id = uid();
    }
  }
  // Ensure markers array exists (older show files may not have it)
  if (!Array.isArray(show.markers)) show.markers = [];

  curFile = filename;
  document.getElementById('filename-display').textContent = filename;

  // Sync BPM input with loaded show value (default 120 if absent)
  const bpmInp = document.getElementById('bpm-input');
  if (bpmInp) bpmInp.value = show.bpm || 120;

  selId = null;
  render();
  renderPropsBar();
  preloadShowImages();
}(data) {
  const solids = [], texts = [];
  for (const eff of (data.effects || [])) {
    const clip = {
      id:       eff.id   || uid(),
      type:     eff.type === 'solid' ? 'color' : eff.type,
      start:    eff.start    || 0,
      duration: eff.duration || 1,
      params:   { color: '#ff0000', ...(eff.params || {}) },
      fade_in:  eff.fade_in  || 0,
      fade_out: eff.fade_out || 0,
    };
    if (eff.type === 'text') texts.push(clip);
    else                     solids.push(clip);
  }
  return {
    version: 2,
    media:   { type: 'video', src: data.video || data.song || '', duration: data.duration || 0 },
    tracks:  [
      { id: 't1', name: 'Solids', layer: 1,  clips: solids },
      { id: 't2', name: 'Text',   layer: 10, clips: texts  },
    ],
    markers: [],
  };
}

function newShow() {
  if (show.tracks.some(t => t.clips.length) &&
      !confirm('Start a new show? Unsaved changes will be lost.')) return;
  show    = blankShow();
  curFile = null;
  selId   = null;
  document.getElementById('filename-display').textContent = 'unsaved';
  const bpmInp = document.getElementById('bpm-input');
  if (bpmInp) bpmInp.value = 120;
  render();
  renderPropsBar();
}

function saveShow() {
  const json = JSON.stringify(show, null, 2);
  const name = curFile || 'show.json';

  // Try server-side save first (when launched via show-sync-editor.py)
  if (curFile) {
    fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: curFile, data: show }),
    })
    .then(r => r.json())
    .then(r => {
      if (r.ok) {
        document.getElementById('filename-display').textContent = curFile + ' ✓';
        setTimeout(() => document.getElementById('filename-display').textContent = curFile, 1500);
      } else {
        browserDownload(json, name);
      }
    })
    .catch(() => browserDownload(json, name));
  } else {
    browserDownload(json, name);
  }
}

function browserDownload(json, name) {
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = name;
  a.click();
  URL.revokeObjectURL(url);
  curFile = name;
  document.getElementById('filename-display').textContent = name;
}

// ── Video events ──────────────────────────────────────────────────────────────
const vid = document.getElementById('video-player');

vid.addEventListener('timeupdate', () => {
  setPlayheadPos();
  renderPreview();
  updateTransport();

  // Auto-scroll playhead into view during playback
  if (!vid.paused) {
    const tl    = document.getElementById('tl-outer');
    const phX   = t2x(vid.currentTime);
    const lw    = 90;  // label width
    const vw    = tl.clientWidth - lw;
    const sl    = tl.scrollLeft;
    if (phX < sl || phX > sl + vw - 40) {
      tl.scrollLeft = phX - vw / 2;
    }
  }
});

vid.addEventListener('play', () => {
  document.getElementById('play-btn').textContent = '⏸ Pause';
  // Start the per-frame sync loop so the playhead and preview stay locked to
  // vid.currentTime at display frame-rate instead of timeupdate's ~4-10 Hz.
  if (_rafId) cancelAnimationFrame(_rafId);
  _rafId = requestAnimationFrame(_rafFrame);
});
vid.addEventListener('pause', () => {
  document.getElementById('play-btn').textContent = '▶ Play';
  if (_rafId) { cancelAnimationFrame(_rafId); _rafId = null; }
});
vid.addEventListener('ended', () => {
  document.getElementById('play-btn').textContent = '▶ Play';
  if (_rafId) { cancelAnimationFrame(_rafId); _rafId = null; }
});
vid.addEventListener('loadedmetadata', () => { render(); });

// Video drag-and-drop onto the video panel
const vwrap = document.getElementById('video-wrap');
vwrap.addEventListener('dragover', e => e.preventDefault());
vwrap.addEventListener('drop', (e) => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) loadMovFile(file);
});

// ── Keyboard shortcuts ────────────────────────────────────────────────────────

document.addEventListener('keydown', (e) => {
  const tag = e.target.tagName;
  if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;

  if (e.code === 'Space') {
    e.preventDefault();
    togglePlay();
  }
  if ((e.code === 'Delete' || e.code === 'Backspace') && selId) {
    e.preventDefault();
    deleteSelected();
  }
  if ((e.code === 'Delete' || e.code === 'Backspace') && !selId && selMarkerId) {
    e.preventDefault();
    deleteMarker(selMarkerId);
  }
  if ((e.key === 's' || e.key === 'S') && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    saveShow();
  }
  // Copy selected clip (text or solid) — Ctrl+C / ⌘C
  if ((e.key === 'c' || e.key === 'C') && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    copySelected();
  }
  // Paste copied clip at current playhead — Ctrl+V / ⌘V
  if ((e.key === 'v' || e.key === 'V') && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    pasteClip();
  }
  // Add marker at current playback position — 'm'
  if (e.key === 'm' || e.key === 'M') {
    e.preventDefault();
    addMarker();
  }
});

// ── Load initial show from server (when opened via show-sync-editor.py) ───────

fetch('/api/initial')
  .then(r => r.json())
  .then(data => {
    if (data && data.show) {
      loadShowData(data.show, data.filename || 'show.json');
    }
  })
  .catch(() => {}); // standalone file:// usage — ignore

// ── Initial render ────────────────────────────────────────────────────────────

initDeviceSelect();
render();
renderPropsBar();
updatePreviewSize();

// Keep preview correctly scaled when the browser window is resized
window.addEventListener('resize', updatePreviewSize);
</script>
