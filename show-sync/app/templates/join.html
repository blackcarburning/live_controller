<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>show-sync</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }

    /* Always-visible connection / sync / RTT status bar */
    #status {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 3px 8px;
      font-family: monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      background: rgba(0,0,0,0.5);
      pointer-events: none;
    }

    /* Full-screen colour / background layer */
    #display {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 1;
    }

    /* Text overlay sits above the colour layer */
    #text-overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: none;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      font-size: 5vmin;
      font-weight: bold;
      text-align: center;
      padding: 1em;
      word-break: break-word;
    }
  </style>
</head>
<body data-session-id="{{ session_id }}">
  <div id="status">Connecting…</div>
  <div id="display"></div>
  <div id="text-overlay"></div>
  <script src="/static/client.js?v=12"></script>
</body>
</html>
